name: Refresh Instagram Token

on:
  schedule:
    - cron: "0 3 1,15 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Refresh long-lived token
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          RESPONSE=$(curl -fsS "https://graph.instagram.com/refresh_access_token?grant_type=ig_refresh_token&access_token=${IG_ACCESS_TOKEN}")
          NEW_TOKEN=$(echo "$RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin)['access_token'])")
          EXPIRES=$(echo "$RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin).get('expires_in', 0))")
          if [ -z "$NEW_TOKEN" ]; then
            echo "No access_token in refresh response" >&2
            exit 1
          fi
          echo "::add-mask::$NEW_TOKEN"
          echo "NEW_TOKEN=$NEW_TOKEN" >> "$GITHUB_ENV"
          echo "Token refreshed. expires_in=${EXPIRES}s (about $((EXPIRES / 86400)) days)"

      - name: Save new token to repository secret
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_PAT secret is not set. Add a fine-grained PAT with Secrets write access." >&2
            exit 1
          fi
          gh secret set IG_ACCESS_TOKEN --repo "$GITHUB_REPOSITORY" --body "$NEW_TOKEN"
          echo "Secret IG_ACCESS_TOKEN updated."
